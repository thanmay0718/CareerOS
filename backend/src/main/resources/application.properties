# =====================================
# Application Configuration
# =====================================
spring.application.name=careeros-backend

# =====================================
# PostgreSQL Database Configuration
# =====================================
spring.datasource.url=jdbc:postgresql://localhost:5432/careeros
spring.datasource.username=postgres
spring.datasource.password=Bunny@0718
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================
# JPA / Hibernate
# =====================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================================
# HikariCP
# =====================================
spring.datasource.hikari.connection-timeout=10000

# =====================================
# Server
# =====================================
server.port=8080

# =====================================
# MVC
# =====================================
spring.mvc.problemdetails.enabled=true

# =====================================
# Logging
# =====================================
logging.level.root=INFO
logging.level.com.careeros=DEBUG
logging.level.org.springframework.security=INFO

# =====================================
# JWT
# =====================================
app.security.jwt.secret=${JWT_SECRET:careeros-development-secret-key-change-before-production-2026}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# =====================================
# Swagger
# =====================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
